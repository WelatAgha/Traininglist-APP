<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">

    <title>Fitness App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00adb5;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* Verhindert das "Zurückwischen" bei echten Apps */
            overscroll-behavior-y: none; 
        }

        .tabs-header {
            display: flex;
            background-color: var(--card-bg);
            padding: 10px;
            /* Berücksichtigt die "Notch" bei modernen iPhones im Vollbild */
            padding-top: env(safe-area-inset-top, 10px);
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
        }

        .tab {
            padding: 8px 16px;
            margin-right: 10px;
            background-color: transparent;
            color: #888;
            border: 1px solid #888;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab.active {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .add-tab-btn {
            padding: 8px 16px;
            background-color: transparent;
            color: var(--accent-color);
            border: 1px dashed var(--accent-color);
            border-radius: 20px;
            cursor: pointer;
        }

        .content {
            flex-grow: 1;
            padding: 15px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .exercise-container-block {
            background-color: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row-top {
            display: grid;
            grid-template-columns: 45px 1fr 30px;
            gap: 10px;
            align-items: center;
        }

        .row-bottom {
            display: grid;
            grid-template-columns: 45px 1fr 60px 30px 20px;
            gap: 10px;
            align-items: center;
        }

        .image-selector {
            width: 45px;
            height: 45px;
            background-color: var(--bg-color);
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            cursor: pointer;
            overflow: hidden;
        }

        .image-selector img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        .note-field {
            margin-top: 5px;
            background-color: #2a2a2a;
            border: 1px solid var(--accent-color);
            color: #ddd;
            padding: 8px;
            border-radius: 5px;
            font-size: 0.85rem;
            display: none;
        }

        .note-field.visible {
            display: block;
        }

        .move-controls {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 4px;
        }

        .btn-icon.active-note { color: var(--accent-color); }
        .delete-btn { color: #ff4c4c; font-size: 1.1rem; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: #333;
            color: #ccc;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Das Copyright */
        .credit {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="tabs-header" id="tabs-container"></div>

    <div class="content">
        <div id="exercises-container"></div>
        <button class="btn-main" onclick="addExercise()"><i class="fa-solid fa-plus"></i> Neues Gerät hinzufügen</button>
        
        <div class="action-buttons">
            <button class="btn-secondary" onclick="exportData()"><i class="fa-solid fa-download"></i> Backup erstellen</button>
            <button class="btn-secondary" onclick="importData()"><i class="fa-solid fa-upload"></i> Daten wiederherstellen</button>
        </div>

        <div class="credit">By Velat Duvarci</div>
    </div>

    <input type="file" id="image-upload" accept="image/*" style="display:none;" onchange="processImageUpload(event)">
    <input type="file" id="data-import" accept=".json" style="display:none;" onchange="processDataImport(event)">

    <script>
        let currentUploadIndex = null;
        let appData = JSON.parse(localStorage.getItem('myFitnessApp')) || {
            activePlanId: 1,
            plans: [{ id: 1, name: 'Tag A', exercises: [] }]
        };

        function saveData() {
            localStorage.setItem('myFitnessApp', JSON.stringify(appData));
            render();
        }

        function render() {
            renderTabs();
            renderExercises();
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            appData.plans.forEach(plan => {
                const btn = document.createElement('button');
                btn.className = `tab ${plan.id === appData.activePlanId ? 'active' : ''}`;
                btn.innerText = plan.name;

                let pressTimer;
                btn.ontouchstart = () => pressTimer = setTimeout(() => editPlan(plan.id), 600);
                btn.ontouchend = () => clearTimeout(pressTimer);
                btn.onclick = (e) => { 
                    appData.activePlanId = plan.id; 
                    saveData(); 
                };
                container.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'add-tab-btn';
            addBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Plan';
            addBtn.onclick = () => {
                const name = prompt('Name des neuen Plans:');
                if (name && name.trim()) {
                    appData.plans.push({ id: Date.now(), name: name.trim(), exercises: [] });
                    appData.activePlanId = appData.plans[appData.plans.length - 1].id;
                    saveData();
                }
            };
            container.appendChild(addBtn);
        }

        function editPlan(id) {
            const plan = appData.plans.find(p => p.id === id);
            const newName = prompt(`Plan bearbeiten (Name löschen zum Entfernen):`, plan.name);
            if (newName === null) return;
            if (newName.trim() === '') {
                if (appData.plans.length === 1) return alert("Letzter Plan kann nicht gelöscht werden.");
                if (confirm(`"${plan.name}" löschen?`)) {
                    appData.plans = appData.plans.filter(p => p.id !== id);
                    appData.activePlanId = appData.plans[0].id;
                    saveData();
                }
            } else { plan.name = newName.trim(); saveData(); }
        }

        function renderExercises() {
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';
            const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
            if(!activePlan) return;

            activePlan.exercises.forEach((ex, index) => {
                const block = document.createElement('div');
                block.className = 'exercise-container-block';

                const imageContent = (ex.image && ex.image.startsWith('data:')) 
                    ? `<img src="${ex.image}">` : `<i class="fa-solid fa-camera"></i>`;

                block.innerHTML = `
                    <div class="row-top">
                        <div class="image-selector" onclick="triggerImageUpload(${index})">${imageContent}</div>
                        <input type="text" placeholder="Gerätename" value="${ex.name || ''}" onchange="updateExercise(${index}, 'name', this.value)">
                        <button class="btn-icon delete-btn" onclick="deleteExercise(${index})"><i class="fa-solid fa-trash"></i></button>
                    </div>

                    <div class="row-bottom">
                        <div></div>
                        <input type="text" placeholder="Einst." value="${ex.settings || ''}" onchange="updateExercise(${index}, 'settings', this.value)">
                        <input type="number" placeholder="kg" value="${ex.weight || ''}" onchange="updateExercise(${index}, 'weight', this.value)">
                        
                        <button class="btn-icon ${ex.notes ? 'active-note' : ''}" onclick="toggleNote(${index})"><i class="fa-solid fa-comment-dots"></i></button>

                        <div class="move-controls">
                            <button class="btn-icon" style="${index === 0 ? 'opacity:0.2' : ''}" onclick="moveExercise(${index}, -1)">▲</button>
                            <button class="btn-icon" style="${index === activePlan.exercises.length-1 ? 'opacity:0.2' : ''}" onclick="moveExercise(${index}, 1)">▼</button>
                        </div>
                    </div>

                    <input type="text" id="note-${index}" class="note-field ${ex.showNote ? 'visible' : ''}" 
                           placeholder="Notiz hinzufügen..." value="${ex.notes || ''}" 
                           onchange="updateExercise(${index}, 'notes', this.value)">
                `;
                container.appendChild(block);
            });
        }

        function toggleNote(index) {
            const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
            activePlan.exercises[index].showNote = !activePlan.exercises[index].showNote;
            render();
        }

        function addExercise() {
            const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
            activePlan.exercises.push({ image: null, name: '', settings: '', weight: '', notes: '', showNote: false });
            saveData();
        }

        function updateExercise(index, field, value) {
            const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
            activePlan.exercises[index][field] = value;
            localStorage.setItem('myFitnessApp', JSON.stringify(appData));
        }

        function deleteExercise(index) {
            if(confirm('Übung löschen?')) {
                const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
                activePlan.exercises.splice(index, 1);
                saveData();
            }
        }

        function moveExercise(index, direction) {
            const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
            const temp = activePlan.exercises[index];
            activePlan.exercises[index] = activePlan.exercises[index + direction];
            activePlan.exercises[index + direction] = temp;
            saveData();
        }

        function triggerImageUpload(index) { currentUploadIndex = index; document.getElementById('image-upload').click(); }

        function processImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 150;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE/w; w = MAX_SIZE; } }
                    else { if (h > MAX_SIZE) { w *= MAX_SIZE/h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const activePlan = appData.plans.find(p => p.id === appData.activePlanId);
                    activePlan.exercises[currentUploadIndex].image = canvas.toDataURL('image/jpeg', 0.7);
                    saveData();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function exportData() {
            const fileName = prompt("Backup-Datei Name:", "MeinTraining_Backup");
            if (!fileName) return;
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName + ".json";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function importData() { document.getElementById('data-import').click(); }

        function processDataImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (confirm("Möchtest du die aktuellen Daten durch dieses Backup ersetzen?")) {
                        appData = importedData;
                        saveData();
                        alert("Daten erfolgreich wiederhergestellt!");
                    }
                } catch (err) { alert("Fehler: Ungültige Backup-Datei."); }
            };
            reader.readAsText(file);
        }

        render();
    </script>
</body>
</html>
